<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-Diagnostic Test - EdVenture</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/profile-style.css">
    <style>
        .prediag-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        .question-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-top: 1.5rem;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .option-btn {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .option-btn:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
        }
        .option-btn.selected {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }
        .action-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .feedback {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-weight: 500;
        }
        .feedback.correct {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }
        .feedback.wrong {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .init-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 2rem;
        }
        .form-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .form-row span {
            font-weight: 600;
            color: var(--text-secondary);
        }
        .form-input {
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .progress-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .summary-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 2rem;
        }
        .summary-panel {
            background: var(--bg-card);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
        }
        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }
        .summary-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .summary-item {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid;
        }
        .summary-item.correct {
            border-left-color: #10b981;
        }
        .summary-item.wrong {
            border-left-color: #ef4444;
        }
        .summary-question {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .summary-answer {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .summary-correct {
            color: #10b981;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .score-display {
            text-align: center;
            padding: 1rem;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 12px;
            margin-top: 1rem;
        }
        .score-number {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hidden {
            display: none;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            border-color: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <div class="container prediag-container">
        <div class="glass-card" style="margin-bottom: 1.5rem;">
            <div class="card-header">
                <h3><i class="fas fa-stethoscope"></i> Pre-Diagnostic Test</h3>
                <p class="text-muted" style="color: var(--text-muted);">Answer each question to calibrate your level</p>
            </div>
        </div>

        <div class="progress-bar" id="progressBarContainer">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>

        <div id="initCard" class="init-card">
            <h4 style="margin-bottom: 1rem;"><i class="fas fa-sliders-h"></i> Quick Setup</h4>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Tell us your starting point before we begin.</p>
            
            <div class="form-row">
                <span><i class="fas fa-chart-line"></i> Grade Level</span>
                <input class="form-input" id="gradeInput" type="text" placeholder="e.g. 7, 8, 9, 10">
            </div>

            <div class="form-row">
                <span><i class="fas fa-book"></i> Completed Chapters</span>
                <input class="form-input" id="chaptersInput" type="text" placeholder="e.g. 1, 2, 3, 4, 5">
            </div>

            <div class="action-row">
                <button id="initSubmit" class="btn btn-primary"><i class="fas fa-play"></i> Begin Test</button>
                <div id="initFeedback" style="color: var(--text-muted); font-size: 0.9rem;"></div>
            </div>
        </div>

        <div id="questionSection" class="hidden">
            <div class="question-card">
                <div class="question-text" id="questionText">Loading question...</div>
                <div class="options-grid" id="optionsGrid"></div>
                <div class="action-row">
                    <button id="submitAnswer" class="btn btn-primary" disabled><i class="fas fa-check"></i> Submit Answer</button>
                    <div id="feedback" class="feedback"></div>
                </div>
                <div class="score-display hidden" id="scoreDisplay">
                    <span class="score-number" id="currentScore">0</span>
                    <span> / <span id="totalQuestions">0</span> completed</span>
                </div>
            </div>
        </div>
    </div>

    <div id="summaryOverlay" class="summary-overlay">
        <div class="summary-panel">
            <div class="summary-header">
                <h4><i class="fas fa-clipboard-list"></i> Test Review</h4>
                <button id="summaryClose" class="btn btn-outline"><i class="fas fa-times"></i> Close</button>
            </div>
            <div id="summaryList" class="summary-list"></div>
        </div>
    </div>
    <script src="js/prediag.js"></script>
</body>
</html>
