<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdVenture - Learn, Grow, Succeed</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/profile-style.css">
    <style>
        .hero-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            max-width: 800px;
            z-index: 2;
        }

        .hero-logo {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: fadeInUp 0.8s ease;
        }

        .hero-tagline {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease 0.1s both;
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .hero-buttons .btn {
            min-width: 180px;
            padding: 1rem 2rem;
            font-size: 1.1rem;
        }

        .hero-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin-top: 4rem;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .feature-item {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .feature-item i {
            font-size: 3rem;
            background: linear-gradient(135deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .feature-item h3 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
        }

        .feature-item p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero-logo {
                font-size: 3rem;
            }
            .hero-tagline {
                font-size: 1.1rem;
            }
            .hero-buttons {
                gap: 1rem;
            }
            .hero-buttons .btn {
                min-width: 140px;
                padding: 0.8rem 1.5rem;
                font-size: 1rem;
            }
            .hero-features {
                grid-template-columns: 1fr;
                gap: 1rem;
                margin-top: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <div class="hero-section">
        <div class="hero-content">
            <h1 class="hero-logo">
                <i class="fas fa-graduation-cap"></i> EdVenture
            </h1>
            <p class="hero-tagline">Turning screen time into real learning.</p>
            <div class="hero-buttons">
                <a href="login.html" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </a>
                <a href="signup.html" class="btn btn-gradient">
                    <i class="fas fa-user-plus"></i> Create Account
                </a>
            </div>
        </div>

        <div class="hero-features">
            <div class="feature-item">
                <i class="fas fa-chalkboard-user"></i>
                <h3>Interactive Learning</h3>
                <p>Engaging lessons designed for real understanding</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-users"></i>
                <h3>Friend Quests</h3>
                <p>Learn together with friends and earn rewards</p>
            </div>
            <div class="feature-item">
                <i class="fas fa-trophy"></i>
                <h3>Achievements</h3>
                <p>Track your progress and earn badges</p>
            </div>
        </div>
    </div>
</body>
</html>
