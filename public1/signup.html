<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EdVenture</title>
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/profile-style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card-custom {
            max-width: 500px;
            width: 100%;
        }
        .form-row-custom {
            margin-bottom: 1.25rem;
        }
        .form-row-custom label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.9rem;
        }
        .form-input-custom {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color, rgba(255,255,255,0.1));
            border-radius: var(--border-radius-sm, 12px);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-input-custom:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        .form-input-custom.error {
            border-color: #ef4444;
        }
        .error-text {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: block;
        }
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.75rem;
        }
        .strength-weak { color: #ef4444; }
        .strength-medium { color: #f59e0b; }
        .strength-strong { color: #10b981; }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .terms-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .terms-row input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .terms-row label {
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .terms-row a {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>

    <div class="auth-page">
        <div class="glass-card auth-card-custom">
            <div class="card-header" style="text-align: center; justify-content: center;">
                <h3><i class="fas fa-user-plus"></i> Create Account</h3>
            </div>
            <div class="card-body">
                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>

                <div class="form-row-custom">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <div style="display: flex; gap: 1rem;">
                        <input type="text" id="signupFName" class="form-input-custom" placeholder="First Name" style="flex: 1;">
                        <input type="text" id="signupLName" class="form-input-custom" placeholder="Last Name" style="flex: 1;">
                    </div>
                </div>

                <div class="form-row-custom">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="signupEmail" class="form-input-custom" placeholder="Enter your email">
                </div>

                <div class="form-row-custom">
                    <label><i class="fas fa-key"></i> Password</label>
                    <input type="password" id="signupPass" class="form-input-custom" placeholder="Create a password">
                    <div id="passwordStrength" class="password-strength"></div>
                </div>

                <div class="form-row-custom">
                    <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                    <input type="password" id="signupConfirmPass" class="form-input-custom" placeholder="Confirm your password">
                </div>

                <div class="terms-row">
                    <input type="checkbox" id="termsCheckbox">
                    <label for="termsCheckbox">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                </div>

                <button onclick="signup()" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-rocket"></i> Create Account
                </button>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('signupPass');
        const confirmInput = document.getElementById('signupConfirmPass');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            if (strength <= 2) {
                strengthDiv.textContent = '⚠ Weak password';
                strengthDiv.className = 'password-strength strength-weak';
            } else if (strength <= 4) {
                strengthDiv.textContent = '⚡ Medium password';
                strengthDiv.className = 'password-strength strength-medium';
            } else {
                strengthDiv.textContent = '✅ Strong password';
                strengthDiv.className = 'password-strength strength-strong';
            }
        });
        
        confirmInput.addEventListener('input', function() {
            const password = passwordInput.value;
            const confirm = this.value;
            
            if (confirm && password !== confirm) {
                this.style.borderColor = '#ef4444';
            } else {
                this.style.borderColor = '';
            }
        });

        function signup() {
            const firstName = document.getElementById('signupFName').value.trim();
            const lastName = document.getElementById('signupLName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPass').value;
            const confirmPass = document.getElementById('signupConfirmPass').value;
            const termsAccepted = document.getElementById('termsCheckbox').checked;
            
            const errorDiv = document.getElementById('signupError');
            const successDiv = document.getElementById('signupSuccess');
            
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            if (!firstName || !lastName) {
                errorDiv.textContent = 'Please enter your full name';
                errorDiv.classList.add('show');
                return;
            }
            
            if (!email) {
                errorDiv.textContent = 'Please enter your email address';
                errorDiv.classList.add('show');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorDiv.textContent = 'Please enter a valid email address';
                errorDiv.classList.add('show');
                return;
            }
            
            if (!password) {
                errorDiv.textContent = 'Please create a password';
                errorDiv.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.classList.add('show');
                return;
            }
            
            if (password !== confirmPass) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            if (!termsAccepted) {
                errorDiv.textContent = 'Please accept the Terms of Service';
                errorDiv.classList.add('show');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('edventure_users') || '[]');
            
            if (users.some(u => u.email === email)) {
                errorDiv.textContent = 'An account with this email already exists';
                errorDiv.classList.add('show');
                return;
            }
            
            const newUser = {
                id: Date.now(),
                name: `${firstName} ${lastName}`,
                firstName: firstName,
                lastName: lastName,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('edventure_users', JSON.stringify(users));
            
            localStorage.setItem('edventure_current_user', JSON.stringify({
                id: newUser.id,
                name: newUser.name,
                email: newUser.email
            }));
            
            successDiv.textContent = 'Account created successfully! Redirecting...';
            successDiv.classList.add('show');
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
        
        document.getElementById('signupConfirmPass').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') signup();
        });
    </script>
</body>
</html>
